name: reviseitai
description: "AI-powered spaced repetition and active recall learning app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0-228.0.dev

dependencies:
  flutter:
    sdk: flutter
  # UI and animations
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  rive: ^0.12.3
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  liquid_swipe: ^3.1.0
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  google_sign_in: ^6.1.6
  
  # State management
  flutter_riverpod: ^2.4.9
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # AI integration
  http: ^1.1.2
  dio: ^5.4.0
  
  # PDF handling
  path_provider: ^2.1.1
  
  # Calendar integration
  table_calendar: ^3.0.9
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
